[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.venv
  | venv
  | env
  | __pycache__
  | migrations
  | staticfiles
  | media
)/
'''

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "booking_system.settings"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test"]
python_functions = ["test_"]
addopts = "-v --tb=short --cov=users --cov=bookings --cov=booking_system --cov-report=term-missing"

[tool.coverage.run]
source = ["users", "bookings", "booking_system"]
omit = ["*/migrations/*", "*/tests/*", "manage.py"]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 50

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
known_first_party = ["booking_system", "users", "bookings"]
