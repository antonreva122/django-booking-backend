[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.venv
  | venv
  | env
  | __pycache__
  | migrations
  | staticfiles
  | media
)/
'''

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "booking_system.settings"
python_files = ["tests.py", "test_*.py"]
python_classes = ["Test"]
python_functions = ["test_"]
addopts = "-v --tb=short"

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
known_first_party = ["booking_system", "users", "bookings"]
